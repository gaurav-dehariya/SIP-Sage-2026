<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Stack Gallery</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <!-- Left Side Images -->
    <div class="image-stack">

        <div class="image top">
            <img src="https://wallpapercat.com/w/full/0/f/4/24693-3840x2160-desktop-4k-jujutsu-kaisen-tv-series-background-photo.jpg" alt="Luffy">
        </div>

        <div class="image upper">
            <img src="https://c4.wallpaperflare.com/wallpaper/404/302/510/jujutsu-kaisen-gojo-satoru-hd-wallpaper-preview.jpg" alt="Luffy">
        </div>

        <div class="image active">
            <img src="https://4kwallpapers.com/images/wallpapers/jujutsu-kaisen-3840x2160-19746.jpg" alt="Luffy">
        </div>

        <div class="image lower">
            <img src="https://images.hdqwalls.com/wallpapers/jujutsu-kaisen-anime-4k-dy.jpg" alt="Luffy">
        </div>

    </div>

    <!-- Right Side Content -->
    <div class="content">

        <div class="navigation">
            <button>↑</button>
            <button>↓</button>
        </div>

        <div class="profile-info">

            <div class="title-row">

                <div class="text">
                    <h1>jujutsu kaisen</h1>
                    <p>GOJO SATORU</p>
                </div>

            </div>

        </div>

        <div class="pagination">
            <span></span>
            <span></span>
            <span></span>
            <span></span>
            <span class="active"></span>
            <span></span>
        </div>

    </div>

</div>
</body>
</html>
